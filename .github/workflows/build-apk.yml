name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Apply custom app icons
        run: |
          pip install Pillow
          python3 << 'EOF'
          from PIL import Image
          import urllib.request, os

          # Download icon from GitHub raw URL
          url = "https://raw.githubusercontent.com/chethanprem/steel_calculator/main/steel-calc-app/android-config/res/mipmap-xxxhdpi/ic_launcher.png"
          urllib.request.urlretrieve(url, "icon_source.png")

          img = Image.open("icon_source.png")
          sizes = {"mdpi":48,"hdpi":72,"xhdpi":96,"xxhdpi":144,"xxxhdpi":192}
          for density, size in sizes.items():
              path = f"android/app/src/main/res/mipmap-{density}"
              os.makedirs(path, exist_ok=True)
              resized = img.resize((size, size), Image.LANCZOS)
              resized.save(f"{path}/ic_launcher.png")
              resized.save(f"{path}/ic_launcher_round.png")
              print(f"✓ {density}: {size}px")
          EOF
          
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: steel-weight-calc-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Steel Calc v1.0 — Build ${{ github.run_number }}
          body: |
            Auto-built APK from commit ${{ github.sha }}
            Install app-debug.apk on Android (enable unknown sources first)
          files: android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
